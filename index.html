<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miko Reading Check</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-container" style="width: 100%; height: 100%;">
        
        <!-- Screen 01: Home / Roster Redesign -->
        <div id="screen-01-home" class="screen">
            <div class="top-bar">
                <h2>Reading Check - Grade 1</h2>
                <div>
                    <p>Today's Progress</p>
                    <div class="progress-bar-container"><div id="progress-bar-fill" class="progress-bar-fill"></div></div>
                </div>
                <button id="btn-teacher-dashboard-trigger" class="btn-invisible">⚙️</button>
            </div>
            
            <div id="up-next-section" class="up-next-section">
                <!-- Injected via JS -->
            </div>

            <div class="queue-section" id="queue-section">
                <!-- Chips injected via JS -->
            </div>
        </div>

        <!-- Screen 02: Transition Redesign -->
        <div id="screen-02-transition" class="screen hidden" style="justify-content: center; align-items: center; text-align: center;">
            <h1 id="transition-greeting" style="font-size: 5rem; color: var(--primary); margin-bottom: 24px;"></h1>
            <h2 style="font-size: 4rem;">Let's read together.</h2>
            <div id="countdown" style="font-size: 10rem; font-weight: 900; color: var(--accent); margin-top: 48px;">3</div>
        </div>

        <!-- Screen 03: Activity Redesign -->
        <div id="screen-03-activity" class="screen hidden">
            <!-- Dynamic Content Injected Here -->
        </div>

        <!-- Screen 04: Celebration Redesign -->
        <div id="screen-04-end" class="screen hidden" style="justify-content: center; align-items: center; text-align: center;">
            <div id="confetti-container"></div>
            <h1 style="font-size: 8rem; color: var(--success); margin-bottom: 24px;">Great Reading!</h1>
            <h2 style="font-size: 4rem;">See you next time!</h2>
        </div>
        
        <!-- Teacher Dashboard Modal Redesign -->
        <div id="teacher-dashboard-modal" class="modal hidden">
            <div class="modal-content">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 48px;">
                    <h2>Teacher Dashboard</h2>
                    <button id="btn-close-dashboard" class="btn-secondary">Close</button>
                </div>
                
                <div class="dashboard-stats" id="dashboard-stats">
                    <!-- Stats injected via JS -->
                </div>

                <div id="dashboard-content">
                    <!-- Student Cards injected via JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Miko Global Avatar (Always Visible) -->
    <div id="miko-global" class="hidden">
        <img src="assets/miko.png" alt="Miko">
    </div>

    <!-- Audio for SFX -->
    <audio id="sfx-success" src="assets/sfx-success.mp3"></audio>
    <audio id="sfx-pop" src="assets/sfx-pop.mp3"></audio>
    <audio id="sfx-chime" src="assets/sfx-chime.mp3"></audio>

    <script src="data.js"></script>
    <script src="storage.js"></script>
    <script src="app.js"></script>
</body>
</html>
