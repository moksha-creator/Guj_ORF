<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miko Reading Check - Grade 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-container">
        <div id="miko-container">
            <img src="assets/miko.png" alt="Miko" id="miko-avatar">
            <div id="miko-bubble" class="hidden">Hello! I am Miko. Let's read together!</div>
        </div>
        
        <div id="main-content">
            <!-- Dynamic Content -->
            <div class="start-screen">
                <h1>English Reading Check</h1>
                <h2>Grade 1</h2>
                <button id="btn-start" class="btn-primary bounce">Start Assessment</button>
            </div>
        </div>

        <div id="controls-container" class="hidden">
            <button id="btn-next" class="btn-secondary">Next</button>
        </div>
    </div>

    <!-- Audio for SFX -->
    <audio id="sfx-success" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <audio id="sfx-pop" src="https://assets.mixkit.co/active_storage/sfx/2578/2578-preview.mp3"></audio>
    <audio id="sfx-chime" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script src="app.js"></script>
</body>
</html>
