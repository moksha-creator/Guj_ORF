<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miko Reading Check - Grade 1</title>
    <!-- Offline manifest and font to be handled in Task 9 -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-container">
        <!-- Roster Screen -->
        <div id="roster-screen" class="screen">
            <h1>Class Roster</h1>
            <div id="student-list"></div>
            <div style="margin-top:2rem;">
                <input type="text" id="new-student-name" placeholder="Student Name" style="font-size: 1.5rem; padding: 0.5rem; border-radius: 10px; border: 2px solid #ccc;">
                <button id="btn-add-student" class="btn-secondary">Add Child</button>
            </div>
            
            <button id="btn-teacher-dashboard-trigger" class="btn-invisible"></button>
        </div>

        <!-- Miko character overlay -->
        <div id="miko-container" class="hidden">
            <img src="assets/miko.png" alt="Miko" id="miko-avatar">
            <div id="miko-bubble" class="hidden">Hello! I am Miko.</div>
            <button id="btn-replay" class="hidden">🔄 Replay</button>
        </div>
        
        <div id="main-content" class="screen hidden">
            <!-- Dynamic Content -->
            <div class="start-screen">
                <h1 id="welcome-student-name">English Reading Check</h1>
                <h2>Grade 1</h2>
                <button id="btn-start" class="btn-primary bounce">Start Assessment</button>
            </div>
        </div>

        <div id="controls-container" class="hidden">
            <div id="progress-strip" class="hidden">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <button id="btn-next" class="btn-secondary">Next</button>
        </div>
        
        <!-- Teacher Dashboard Modal -->
        <div id="teacher-dashboard-modal" class="modal hidden">
            <div class="modal-content">
                <h2>Teacher Dashboard</h2>
                <div id="dashboard-content"></div>
                <button id="btn-close-dashboard" class="btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <!-- Audio for SFX -->
    <audio id="sfx-success" src="assets/sfx-success.mp3"></audio>
    <audio id="sfx-pop" src="assets/sfx-pop.mp3"></audio>
    <audio id="sfx-chime" src="assets/sfx-chime.mp3"></audio>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
    <script src="data.js"></script>
    <script src="storage.js"></script>
    <script src="app.js"></script>
</body>
</html>
