<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miko Reading Check</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-container" style="width: 100%; height: 100%;">
        
        <!-- Screen 00: Configuration -->
        <div id="screen-00-config" class="screen">
            <h1 style="margin-bottom: 24px;">ORF Setup</h1>
            <p style="margin-bottom: 32px; color: var(--text-muted);">One-time class configuration.</p>
            
            <div style="display:flex; gap: 32px; flex-wrap: wrap;">
                <div class="card" style="flex:1; min-width: 300px;">
                    <h3>Class Details</h3>
                    <label style="display:block; margin-top:16px;">Grade</label>
                    <select id="config-grade" style="width:100%; padding:8px; font-size:1.2rem;"><option>Grade 1</option><option>Grade 2</option><option>Grade 3</option></select>
                    
                    <label style="display:block; margin-top:16px;">Division</label>
                    <input type="text" id="config-division" placeholder="e.g. A" style="width:100%; padding:8px; font-size:1.2rem;">
                    
                    <label style="display:block; margin-top:16px;">Roster Import (One name per line)</label>
                    <textarea id="config-roster" rows="5" style="width:100%; padding:8px; font-size:1.2rem;" placeholder="Aarav\nDiya\nRiya"></textarea>
                </div>
                
                <div class="card" style="flex:1; min-width: 300px;">
                    <h3>Assessment Rules</h3>
                    <label style="display:block; margin-top:16px;">Language Tracks</label>
                    <div><input type="checkbox" id="track-en" checked> English</div>
                    <div><input type="checkbox" id="track-gj"> Gujarati</div>
                    
                    <label style="display:block; margin-top:16px;">Cadence</label>
                    <select id="config-cadence" style="width:100%; padding:8px; font-size:1.2rem;">
                        <option value="rolling">Rolling across the month (20 days)</option>
                        <option value="designated">One designated week a month (5 days)</option>
                    </select>
                    
                    <label style="display:block; margin-top:16px;">Assessment Slot</label>
                    <select id="config-slot" style="width:100%; padding:8px; font-size:1.2rem;">
                        <option value="lecture">Within a lecture (2 per day)</option>
                        <option value="dedicated">Dedicated slot (5 per day)</option>
                        <option value="extended">Extended block (15 per day)</option>
                        <option value="full">Full day testing (30 per day)</option>
                    </select>
                </div>
            </div>
            
            <div class="card" style="margin-top: 32px; background: #E5E7EB;" id="coverage-box">
                <h3 id="coverage-verdict">Coverage Status</h3>
                <p id="coverage-details" style="font-size: 1.2rem; margin-top: 8px;">Waiting for roster...</p>
                <button id="btn-confirm-config" class="btn-primary" style="margin-top: 16px;" disabled>Confirm Setup</button>
            </div>
        </div>

        <!-- Screen 01: Home / Roster Redesign -->
        <div id="screen-01-home" class="screen">
            <div class="top-bar">
                <h2>Reading Check - Grade 1</h2>
                <div>
                    <p>Today's Progress</p>
                    <div class="progress-bar-container"><div id="progress-bar-fill" class="progress-bar-fill"></div></div>
                </div>
                <button id="btn-teacher-dashboard-trigger" class="btn-invisible">⚙️</button>
            </div>
            
            <div id="up-next-section" class="up-next-section">
                <!-- Injected via JS -->
            </div>

            <div class="queue-section" id="queue-section">
                <!-- Chips injected via JS -->
            </div>
        </div>

        <!-- Screen 02: Transition Redesign -->
        <div id="screen-02-transition" class="screen hidden" style="justify-content: center; align-items: center; text-align: center;">
            <h1 id="transition-greeting" style="font-size: 5rem; color: var(--primary); margin-bottom: 24px;"></h1>
            <h2 style="font-size: 4rem;">Let's read together.</h2>
            <div id="countdown" style="font-size: 10rem; font-weight: 900; color: var(--accent); margin-top: 48px;">3</div>
        </div>

        <!-- Screen 03: Activity Redesign -->
        <div id="screen-03-activity" class="screen hidden">
            <!-- Dynamic Content Injected Here -->
        </div>

        <!-- Screen 04: Celebration Redesign -->
        <div id="screen-04-end" class="screen hidden" style="justify-content: center; align-items: center; text-align: center;">
            <div id="confetti-container"></div>
            <h1 style="font-size: 8rem; color: var(--success); margin-bottom: 24px;">Great Reading!</h1>
            <h2 style="font-size: 4rem;">See you next time!</h2>
        </div>
        
        <!-- Teacher Dashboard Modal Redesign -->
        <div id="teacher-dashboard-modal" class="modal hidden">
            <div class="modal-content">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 48px;">
                    <h2>Teacher Dashboard</h2>
                    <button id="btn-close-dashboard" class="btn-secondary">Close</button>
                </div>
                
                <div class="dashboard-stats" id="dashboard-stats">
                    <!-- Stats injected via JS -->
                </div>

                <div id="dashboard-content">
                    <!-- Student Cards injected via JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Miko Global Avatar (Always Visible) -->
    <div id="miko-global" class="hidden">
        <img src="assets/miko.png" alt="Miko">
    </div>

    <!-- Audio for SFX -->
    <audio id="sfx-success" src="assets/sfx-success.mp3"></audio>
    <audio id="sfx-pop" src="assets/sfx-pop.mp3"></audio>
    <audio id="sfx-chime" src="assets/sfx-chime.mp3"></audio>

    <script src="data.js"></script>
    <script src="storage.js"></script>
    <script src="app.js"></script>
</body>
</html>
